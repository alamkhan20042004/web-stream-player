<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin-when-cross-origin">
    <title>Live Stream Player - Pro Admin Panel</title>
    
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: #ffffff; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        /* Top Bar Styling */
        .add-stream-container { background-color: #1e1e1e; padding: 15px 20px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #333; flex-wrap: wrap; }
        .add-stream-container input { padding: 8px 12px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px; outline: none; }
        .add-btn { padding: 8px 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .add-btn:hover { background-color: #0056b3; }
        .add-btn:disabled { background-color: #555; cursor: not-allowed; }
        
        /* Channel List Styling */
        .channel-list { padding: 15px 20px; background-color: #181818; display: flex; gap: 15px; flex-wrap: wrap; min-height: 40px; }
        
        /* Ek channel ka pura dabba (Wrapper) */
        .channel-wrapper { display: flex; align-items: center; background-color: #333; border: 1px solid #444; border-radius: 20px; padding-right: 5px; overflow: hidden; transition: 0.2s; }
        .channel-wrapper:hover { border-color: #666; }
        .channel-wrapper.active { background-color: #e50914; border-color: #e50914; }
        
        /* Channel Play Button */
        .channel-btn { padding: 8px 16px; background: transparent; color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* Edit & Delete Action Buttons */
        .action-btn { background: transparent; border: none; color: white; cursor: pointer; padding: 5px; font-size: 14px; opacity: 0.7; transition: 0.2s; }
        .action-btn:hover { opacity: 1; transform: scale(1.2); }
        .action-btn.delete:hover { color: #ff4d4d; }
        
        /* Player & Status */
        .player-container { flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .status-text { color: #aaa; font-size: 14px; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="add-stream-container">
        <span>➕ Add Channel:</span>
        <input type="text" id="streamName" placeholder="Channel Name">
        <input type="text" id="streamUrl" placeholder="Iframe Link">
        <button id="actionBtn" class="add-btn" onclick="addNewStream()">Add to Cloud</button>
        <span id="statusMsg" class="status-text">Fetching channels from cloud... ⏳</span>
    </div>

    <div class="channel-list" id="channelList">
        </div>

    <div class="player-container">
        <iframe id="mainPlayer" src="" allowfullscreen allow="encrypted-media; picture-in-picture; fullscreen"></iframe>
    </div>

    <script>
        // YAHAN APNI JSONBIN DETAILS DAALEIN
        const BIN_ID = '6a46006af5f4af5e2951f5fc'; 
        const API_KEY = '$2a$10$rMbmIiFc3q.cKoBht3ernu32724Pmby9BF874kyybDSrlR7F60hvi';
        
        let channels = [];
        let activeIndex = 0; // Kounsa channel play ho raha hai

        // 1. Page Load Hone Par Data Mangwana
        window.onload = async function() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await response.json();
                channels = data.record;
                
                document.getElementById('statusMsg').textContent = "Connected to Cloud ✅";
                renderChannels();
                
                if(channels.length > 0) {
                    playStream(0);
                }
            } catch (error) {
                document.getElementById('statusMsg').textContent = "Connection Error ❌";
                console.error(error);
            }
        };

        // 2. Cloud Par Data Save Karna (Add, Edit, Delete ke baad)
        async function saveToCloud() {
            const status = document.getElementById('statusMsg');
            status.textContent = "Syncing with cloud... ⏳";
            
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(channels)
                });
                status.textContent = "Saved Successfully ✅";
            } catch (error) {
                status.textContent = "Failed to save ❌";
                console.error(error);
            }
        }

        // 3. Screen Par Channels Lagana
        function renderChannels() {
            const listDiv = document.getElementById('channelList');
            listDiv.innerHTML = ''; 

            channels.forEach((ch, index) => {
                // Wrapper Div
                const wrapper = document.createElement('div');
                wrapper.className = 'channel-wrapper';
                if (index === activeIndex) wrapper.classList.add('active');
                
                // Play Button
                const playBtn = document.createElement('button');
                playBtn.className = 'channel-btn';
                playBtn.textContent = ch.name;
                playBtn.onclick = () => playStream(index);

                // Edit Button
                const editBtn = document.createElement('button');
                editBtn.className = 'action-btn';
                editBtn.innerHTML = '✏️';
                editBtn.title = "Edit Channel";
                editBtn.onclick = () => editStream(index);

                // Delete Button
                const delBtn = document.createElement('button');
                delBtn.className = 'action-btn delete';
                delBtn.innerHTML = '🗑️';
                delBtn.title = "Delete Channel";
                delBtn.onclick = () => deleteStream(index);

                // In sab ko wrapper mein daalo
                wrapper.appendChild(playBtn);
                wrapper.appendChild(editBtn);
                wrapper.appendChild(delBtn);

                // Wrapper ko screen par lagao
                listDiv.appendChild(wrapper);
            });
        }

        // 4. Stream Play Karna
        function playStream(index) {
            activeIndex = index;
            document.getElementById('mainPlayer').src = channels[index].url;
            renderChannels(); // Active color update karne ke liye refresh UI
        }

        // 5. Naya Channel Add Karna
        function addNewStream() {
            const nameInput = document.getElementById('streamName').value;
            const urlInput = document.getElementById('streamUrl').value;

            if (nameInput === '' || urlInput === '') {
                alert('Channel Name aur Link dono enter karein!');
                return;
            }

            channels.push({ name: nameInput, url: urlInput });
            document.getElementById('streamName').value = '';
            document.getElementById('streamUrl').value = '';
            
            renderChannels();
            saveToCloud(); // Naya data cloud pe bhejo
        }

        // 6. Channel Edit Karna
        function editStream(index) {
            const currentChannel = channels[index];
            
            // User se naya naam aur URL mango
            const newName = prompt("Naya Channel Name likhein:", currentChannel.name);
            if (newName === null) return; // Agar user Cancel kar de
            
            const newUrl = prompt("Naya Iframe Link likhein:", currentChannel.url);
            if (newUrl === null) return;

            if (newName.trim() !== '' && newUrl.trim() !== '') {
                channels[index] = { name: newName, url: newUrl }; // Array update ki
                renderChannels(); // UI update kiya
                saveToCloud(); // Cloud update kiya
                
                // Agar edit wala channel abhi chal raha hai toh usko wapas reload karo
                if (index === activeIndex) {
                    playStream(index);
                }
            } else {
                alert("Naam ya URL khali nahi ho sakta!");
            }
        }

        // 7. Channel Delete Karna
        function deleteStream(index) {
            if (confirm(`Kya aap waqai "${channels[index].name}" ko delete karna chahte hain?`)) {
                channels.splice(index, 1); // Array se uda do
                
                // Agar delete wala channel play ho raha tha, toh kisi aur ko play karo
                if (index === activeIndex) {
                    activeIndex = 0; 
                    if(channels.length > 0) {
                        document.getElementById('mainPlayer').src = channels[0].url;
                    } else {
                        document.getElementById('mainPlayer').src = "";
                    }
                } else if (index < activeIndex) {
                    activeIndex--; // Active index theek karo agar us se pichla delete hua hai
                }

                renderChannels();
                saveToCloud();
            }
        }
    </script>
</body>
</html>
