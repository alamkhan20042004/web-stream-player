<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin-when-cross-origin">
    <title>Live Stream Player - Unique URLs</title>
    
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: #ffffff; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        .top-bar { background-color: #1e1e1e; padding: 15px 20px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #333; }
        .input-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .input-group input { padding: 8px 12px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px; outline: none; }
        
        .btn { padding: 8px 16px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-add { background-color: #007bff; } .btn-add:hover { background-color: #0056b3; }
        .btn-sync { background-color: #28a745; } .btn-sync:hover { background-color: #1e7e34; }
        
        .channel-list { padding: 15px 20px; background-color: #181818; display: flex; gap: 15px; flex-wrap: wrap; min-height: 40px; }
        .channel-wrapper { display: flex; align-items: center; background-color: #333; border: 1px solid #444; border-radius: 20px; padding-right: 5px; overflow: hidden; }
        .channel-wrapper.active { background-color: #e50914; border-color: #e50914; }
        .channel-btn { padding: 8px 16px; background: transparent; color: white; border: none; cursor: pointer; font-weight: bold; }
        
        .action-btn { background: transparent; border: none; color: white; cursor: pointer; padding: 5px; font-size: 14px; opacity: 0.7; }
        .action-btn:hover { opacity: 1; transform: scale(1.2); }
        .action-btn.delete:hover { color: #ff4d4d; }
        
        .player-container { flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .status-text { color: #aaa; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="input-group">
            <span>➕ New Channel:</span>
            <input type="text" id="streamName" placeholder="Channel Name">
            <input type="text" id="streamUrl" placeholder="Iframe Link">
            <button id="addBtn" class="btn btn-add" onclick="addNewStream()">Save</button>
            <button id="syncBtn" class="btn btn-sync" onclick="syncFromCloud()">⬇️ Sync from Cloud</button>
            <span id="statusMsg" class="status-text">Ready.</span>
        </div>
    </div>

    <div class="channel-list" id="channelList">
        </div>

    <div class="player-container">
        <iframe id="mainPlayer" src="" allowfullscreen allow="encrypted-media; picture-in-picture; fullscreen"></iframe>
    </div>

    <script>
        // YAHAN APNI JSONBIN DETAILS DAALEIN
        const BIN_ID = '6a46006af5f4af5e2951f5fc'; 
        const API_KEY = '$2a$10$rMbmIiFc3q.cKoBht3ernu32724Pmby9BF874kyybDSrlR7F60hvi';
        
        let channels = [];
        let activeIndex = 0;

        // 1. Page Load par Data lana
        window.onload = function() {
            const localData = localStorage.getItem('mySavedChannels');
            if (localData) {
                channels = JSON.parse(localData);
                document.getElementById('statusMsg').textContent = "Loaded from Local Device 📱";
                renderChannels();
                checkUrlAndPlay(); // URL check karke play karega
            } else {
                syncFromCloud();
            }
        };

        // 2. URL Check karna aur specific channel play karna
        function checkUrlAndPlay() {
            if (channels.length === 0) return;
            
            const urlParams = new URLSearchParams(window.location.search);
            const targetChannelName = urlParams.get('ch'); // URL se '?ch=Naam' uthayega
            
            let targetIndex = 0; // Default pehla channel
            
            if (targetChannelName) {
                // Agar URL mein koi channel hai, toh usko list mein dhoondo
                const foundIndex = channels.findIndex(c => c.name === targetChannelName);
                if (foundIndex !== -1) {
                    targetIndex = foundIndex; // Mil gaya toh index update kar do
                }
            }
            
            playStream(targetIndex);
        }

        // 3. Cloud se Fetch
        async function syncFromCloud() {
            const status = document.getElementById('statusMsg');
            const syncBtn = document.getElementById('syncBtn');
            syncBtn.disabled = true;
            status.textContent = "Fetching from Cloud... ⏳";
            
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await response.json();
                channels = data.record;
                
                localStorage.setItem('mySavedChannels', JSON.stringify(channels));
                
                status.textContent = "Cloud Sync Complete ✅";
                renderChannels();
                checkUrlAndPlay(); // Sync hone ke baad URL check karega
            } catch (error) {
                status.textContent = "Sync Error ❌";
                console.error(error);
            } finally {
                syncBtn.disabled = false;
            }
        }

        // 4. Data Save Karna
        async function saveData() {
            const status = document.getElementById('statusMsg');
            localStorage.setItem('mySavedChannels', JSON.stringify(channels));
            
            status.textContent = "Updating Cloud... ⏳";
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(channels)
                });
                status.textContent = "Saved to Cloud ✅";
            } catch (error) {
                status.textContent = "Cloud Save Failed ❌ (Saved Locally)";
                console.error(error);
            }
        }

        // 5. Render Channels
        function renderChannels() {
            const listDiv = document.getElementById('channelList');
            listDiv.innerHTML = ''; 

            channels.forEach((ch, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'channel-wrapper';
                if (index === activeIndex) wrapper.classList.add('active');
                
                const playBtn = document.createElement('button');
                playBtn.className = 'channel-btn';
                playBtn.textContent = ch.name;
                playBtn.onclick = () => playStream(index);

                const editBtn = document.createElement('button');
                editBtn.className = 'action-btn';
                editBtn.innerHTML = '✏️';
                editBtn.onclick = () => editStream(index);

                const delBtn = document.createElement('button');
                delBtn.className = 'action-btn delete';
                delBtn.innerHTML = '🗑️';
                delBtn.onclick = () => deleteStream(index);

                wrapper.appendChild(playBtn);
                wrapper.appendChild(editBtn);
                wrapper.appendChild(delBtn);
                listDiv.appendChild(wrapper);
            });
        }

        // 6. Play Stream & Update URL Uniquely
        function playStream(index) {
            activeIndex = index;
            document.getElementById('mainPlayer').src = channels[index].url;
            renderChannels(); 
            
            // Yahan URL uniquely update ho raha hai (e.g. ?ch=ChannelName)
            const safeName = encodeURIComponent(channels[index].name);
            const newUrl = window.location.pathname + '?ch=' + safeName;
            window.history.pushState(null, '', newUrl);
        }

        // 7. Actions (Add, Edit, Delete)
        function addNewStream() {
            const nameInput = document.getElementById('streamName').value;
            const urlInput = document.getElementById('streamUrl').value;
            if (nameInput === '' || urlInput === '') return alert('Details enter karein!');
            channels.push({ name: nameInput, url: urlInput });
            document.getElementById('streamName').value = '';
            document.getElementById('streamUrl').value = '';
            renderChannels();
            saveData(); 
        }

        function editStream(index) {
            const newName = prompt("Naya Channel Name:", channels[index].name);
            if (newName === null) return; 
            const newUrl = prompt("Naya Iframe Link:", channels[index].url);
            if (newUrl === null) return;
            if (newName.trim() !== '' && newUrl.trim() !== '') {
                channels[index] = { name: newName, url: newUrl };
                renderChannels();
                saveData(); 
                if (index === activeIndex) playStream(index);
            }
        }

        function deleteStream(index) {
            if (confirm(`"${channels[index].name}" ko delete karein?`)) {
                channels.splice(index, 1);
                if (index === activeIndex) {
                    activeIndex = 0; 
                    if(channels.length > 0) playStream(0);
                    else document.getElementById('mainPlayer').src = "";
                } else if (index < activeIndex) activeIndex--;
                renderChannels();
                saveData(); 
            }
        }
    </script>
</body>
</html>
